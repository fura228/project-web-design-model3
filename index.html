<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALACE</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="title">
        <p>PALACE</p>
    </div>
    <section class="screen screen-2">
    <div class="cherep-title">
        <img src="cherep-text.svg" alt="Череп"> 
    </div>
    
    <div class="puzzle-container">
        <div class="drop-zone" id="drop-zone">
            <img src="skull-complete.svg" id="skull-complete" class="hidden" alt="full skull">
        </div>
        <div class="puzzle-pieces" id="puzzle-pieces">
            </div>
    </div>
</section>

<section class="screen screen-3">
    <div class="agnosia-bg-text">АГНОЗИЯ</div>
    
    <div id="game-modal" class="modal hidden">
        <p id="game-task">Найди: Кота</p>
        <button id="start-game-btn">Начать</button>
    </div>

    <div class="game-area-smooth" id="game-area">
        <div class="game-item-smooth" data-id="cat"><img src="assets/cat.svg" alt="cat"></div>
        <div class="game-item-smooth" data-id="lamp"><img src="assets/lamp.svg" alt="lamp"></div>
        <div class="game-item-smooth" data-id="hat"><img src="assets/hat.svg" alt="hat"></div>
    </div>
</section>

<section class="screen screen-4">
    <div class="therapy-bg-text">ТЕРАПИЯ</div>
    
    <div class="tangle-container" id="tangle-container">
        <img src="assets/10684cce-815b-4b6e-805e-b03fa627b2c7-Photoroom 3.svg" id="tangle-svg" class="tangle" alt="tangle">
        <img src="straight-line.svg" id="straight-svg" class="straight" alt="straight line">
    </div>
</section>
    <script src="script.js"></script>
</body>
</html>
